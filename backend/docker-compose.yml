services:
  db:
    image: postgres:15
    container_name: climanuvem_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - climanuvem_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: climanuvem_ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - climanuvem_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    build: .
    container_name: climanuvem_backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./secrets:/app/secrets
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - FIREBASE_KEY_PATH=secrets/firebase_key.json
      - OLLAMA_URL=http://ollama:11434/api/generate
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - climanuvem_net

networks:
  climanuvem_net:

volumes:
  postgres_data:
  ollama_data:
