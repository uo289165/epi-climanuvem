services:
  backend:
    build: ./backend
    container_name: deno-backend
    ports:
      - "8080:8080"
    networks:
      - deno-net

  frontend:
    build: ./frontend
    container_name: deno-frontend
    ports:
      - "5173:5173"
    networks:
      - deno-net
    depends_on:
      - backend

networks:
  deno-net:
    driver: bridge
