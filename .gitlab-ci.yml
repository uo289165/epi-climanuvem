stages:
  - test
  - build

variables:
  DOCKER_DRIVER: overlay2
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"

static_analysis_backend:
  stage: test
  image: python:3.11-slim
  script:
    - echo "Running static analysis backend with flake8..."
    - cd backend
    - pip install flake8
    - flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
    - flake8 app --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
  only:
    - branches
    - main
    - tags

backend_tests:
  stage: test
  image: python:3.13-slim
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    DATABASE_URL: "sqlite:///:memory:"
    TEST_MODE: "true"
    DISABLE_WORKER: "true"
  cache:
    key: "backend-pip-cache"
    paths:
      - .cache/pip/
  script:
    - echo "Running backend unit tests..."
    - cd backend
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt -r requirements-dev.txt
    - python -m pytest
  only:
    - branches
    - main
    - tags

static_analysis_frontend:
  stage: test
  image: node:20-alpine
  script:
    - echo "Running static analysis frontend..."
    - cd frontend
    - npm ci
    - npm run lint
  cache:
    key: "frontend-npm-cache"
    paths:
      - frontend/.npm/
  only:
    - branches
    - main
    - tags

frontend_tests:
  stage: test
  image: node:22
  cache:
    key: "frontend-npm-test-cache"
    paths:
      - frontend/.npm/
  script:
    - echo "Running frontend unit tests..."
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm test -- --runInBand
  only:
    - branches
    - main
    - tags

build_backend:
  stage: build
  image: docker:27
  needs:
    - static_analysis_backend
    - backend_tests
  services:
    - docker:dind
  script:
    - echo "Building backend docker images..."
    #- docker build -t "epi-climanuvem-backend" ./backend
    #- docker tag epi-climanuvem-backend:latest epi-climanuvem-backend:$CI_COMMIT_SHORT_SHA
    # Opcional: subir al registry, para esto hay que configrar el usuario y token en los Secrets. Esto nos permite bajarnos la imagen desde otra máquina (e.g prouccion..)
    #- echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" $CI_REGISTRY --password-stdin
    #- docker push $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
