stages:
  - test
  - build

variables:
  DOCKER_DRIVER: overlay2
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"

static_analysis_backend:
  stage: test
  image: python:3.11-slim
  script:
    - echo "Running static analysis backend with flake8..."
    - cd backend
    - pip install flake8
    - flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
    - flake8 app --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
  only:
    - branches
    - main
    - tags

static_analysis_frontend:
  stage: test
  image: node:20-alpine
  script:
    - echo "Running static analysis frontend..."
    - cd frontend
    - npm ci
    - npm run lint
  cache:
    key: "frontend-npm-cache"
    paths:
      - frontend/.npm/
  only:
    - branches
    - main
    - tags

build_backend:
  stage: build
  image: docker:27
  needs:
    - static_analysis_backend
  services:
    - docker:dind
  script:
    - echo "Building backend docker images..."
